name: Python Quality Check

on: [push, pull_request]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install linting tools only
        run: |
          python -m pip install --upgrade pip
          pip install black==25.12.0 flake8

      - name: Check Formatting (Black)
        run: |
          black --check AI_Agents/scripts/ AI_Agents/src/ --extend-exclude="requirements.txt"

      - name: Check Logic & Style (Flake8)
        run: |
          flake8 AI_Agents/scripts/ AI_Agents/src/ --exclude=requirements.txt --ignore=E501,W503 --count --show-source --statistics
