name: SyntheticSoul AI Quality Check

on: [push, pull_request]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f AI_Agents/requirements.txt ]; then pip install -r AI_Agents/requirements.txt; fi
        
    - name: 1. Check Formatting (Black)
      # Se fallisce qui, il dev deve lanciare "black ." sul suo PC
      run: |
        black --check AI_Agents
        
    - name: 2. Check Logic & Style (Flake8)
      # Ignoriamo E501 (lunghezza riga) perché se ne occupa già Black
      run: |
        flake8 AI_Agents --ignore=E501,W503 --count --show-source --statistics